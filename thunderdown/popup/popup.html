<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 16px;
      min-width: 240px;
      color: #24292e;
      background: #ffffff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eaecef;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .status.editing {
      background: #f6f8fa;
      color: #586069;
    }
    .status.rendered {
      background: #dcffe4;
      color: #165c26;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .editing .status-dot { background: #959da5; }
    .rendered .status-dot { background: #2ea44f; }
    .shortcut {
      font-size: 12px;
      color: #6a737d;
    }
    kbd {
      background: #f6f8fa;
      border: 1px solid #d1d5da;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 11px;
    }
    .footer {
      margin-top: 8px;
      font-size: 11px;
      color: #959da5;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/icon-32.png" alt="">
    <h1>Thunderdown</h1>
  </div>

  <div id="status" class="status editing">
    <span class="status-dot"></span>
    <span id="status-text">Editing Markdown</span>
  </div>

  <div class="shortcut">
    Toggle: <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>M</kbd>
  </div>

  <div class="footer">v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
