name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Verify (lint + test + security)
        run: make verify

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update manifest version
        run: |
          cd thunderdown
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' manifest.json > manifest.tmp
          mv manifest.tmp manifest.json

      - name: Build .xpi
        run: make build

      - name: Rename .xpi with version
        run: cp thunderdown.xpi "thunderdown-${{ steps.version.outputs.version }}.xpi"

      - name: Generate update hash
        id: hash
        run: |
          hash=$(shasum -a 256 "thunderdown-${{ steps.version.outputs.version }}.xpi" | awk '{print "sha256:" $1}')
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Update updates.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          HASH="${{ steps.hash.outputs.hash }}"
          XPI_URL="https://github.com/cjimti/thunderdown/releases/download/v${VERSION}/thunderdown-${VERSION}.xpi"
          INFO_URL="https://github.com/cjimti/thunderdown/releases/tag/v${VERSION}"

          # Build new update entry
          NEW_ENTRY=$(jq -n \
            --arg ver "$VERSION" \
            --arg link "$XPI_URL" \
            --arg hash "$HASH" \
            --arg info "$INFO_URL" \
            '{
              version: $ver,
              update_link: $link,
              update_hash: $hash,
              update_info_url: $info,
              applications: {
                gecko: {
                  strict_min_version: "128.0",
                  strict_max_version: "*"
                }
              }
            }')

          # Remove any existing entry for this version, then append new one
          jq --argjson entry "$NEW_ENTRY" \
            '(.addons["thunderdown@cjimti.com"].updates |= (map(select(.version != $entry.version)) + [$entry]))' \
            docs/updates.json > docs/updates.tmp
          mv docs/updates.tmp docs/updates.json

      - name: Commit and push updates.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/updates.json
          git diff --cached --quiet || git commit -m "Update updates.json for v${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: thunderdown-${{ steps.version.outputs.version }}.xpi
          generate_release_notes: true
